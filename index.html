    <script>
      // Capture the PWA install prompt as early as possible. Chrome fires
      // `beforeinstallprompt` very early — often before React mounts — and it
      // never re-fires, so the in-app banner would miss it. We stash it on
      // window and broadcast a custom event the React component listens for.
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
        window.dispatchEvent(new Event('pwa-install-available'));
      });
      window.addEventListener('appinstalled', function () {
        window.__pwaInstallPrompt = null;
        window.dispatchEvent(new Event('pwa-installed'));
      });
    </script>
    <script>
      // Restore path after GitHub Pages 404 redirect (see public/404.html).
      // Converts /?/auth/callback&code=abc back to /auth/callback?code=abc
      // and preserves the URL hash (needed for Supabase implicit-flow tokens).
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
  </head>
  <body>
