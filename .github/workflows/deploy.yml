name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Run database migrations
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -n "$SUPABASE_DB_URL" ]; then
            npm run migrate
          else
            echo "⚠️  SUPABASE_DB_URL not set, skipping migrations"
          fi

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -n "$SUPABASE_ACCESS_TOKEN" ]; then
            npx -y supabase@2.106.0 functions deploy --project-ref kpkwmizxvvjdlpaczese
          else
            echo "⚠️  SUPABASE_ACCESS_TOKEN not set, skipping edge function deploy"
          fi

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME || 'BolãoCopa' }}
          VITE_APP_YEAR: ${{ vars.VITE_APP_YEAR || '2026' }}
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL }}
          # OPENAI_API_KEY is a Supabase Edge Function secret — NOT exposed in the build.
          # Add it via: Supabase Dashboard → Settings → Edge Functions → Secrets

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
