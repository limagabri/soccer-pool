<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>BolãoCopa 2026</title>
    <script>
      // GitHub Pages SPA redirect.
      // Encodes the full path/search/hash into a query string so index.html
      // can restore it with history.replaceState before React boots.
      // pathSegmentsToKeep=1 preserves the /bolao-copa/ repo prefix.
      var segs = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segs).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segs).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
